# ref: https://docs.npmjs.com/trusted-publishers/
# ref: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages#publishing-packages-using-yarn
name: Publish Package to NPM
on:
  release:
    types: [published]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          # registry-url removed - it sets NODE_AUTH_TOKEN which prevents OIDC authentication
      - name: Install Dependencies
        run: yarn install
      - name: Build
        run: yarn build
      - name: Publish to NPM
        # Must use npm publish (not yarn publish) — OIDC Trusted Publishing is only supported by the npm CLI
        run: npm publish --provenance --access public
