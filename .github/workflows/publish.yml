# ref: https://docs.npmjs.com/trusted-publishers/
# ref: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages#publishing-packages-using-yarn
name: Publish Package to NPM
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (test without publishing)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: ''  # Disable cache to prevent NODE_AUTH_TOKEN from being set
      - name: Install Dependencies
        run: yarn install
      - name: Build
        run: yarn build
      - name: Debug - Check OIDC environment
        run: |
          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "✓ NODE_AUTH_TOKEN not set (OIDC enabled)"
          else
            echo "✗ NODE_AUTH_TOKEN is set (will block OIDC!)"
          fi
      - name: Publish to NPM
        # Must use npm publish (not yarn publish) — OIDC Trusted Publishing is only supported by the npm CLI
        run: npm publish --provenance --access public --loglevel verbose
